name: 'Build macOS'
description: 'macos build steps'

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update submodules
      run: 'git submodule update --init --recursive'

    - name: Build
      run: 'make'

    - name: Build Info
      run: 'file ol; make describe'
