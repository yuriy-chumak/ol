name: s390x 64

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  TERM: xterm-256color

# save resources, stop outdated workflows
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update submodules
      run: 'git submodule update --init --recursive'

    - name: Apt update
      run: 'sudo rm -f /var/lib/man-db/auto-update; sudo apt update'

    - name: Make ol/vm.h
      run: 'make includes/ol/vm.h'


    - name: Install gcc toolchain
      run: 'sudo apt install gcc-s390x-linux-gnu -y'

    - name: Install qemu
      run: 'sudo apt install qemu-system-s390x qemu-user'

    - name: Build
      run: 'make tmp/olvm-s390x-release'

    - name: Build Info
      run: |
        file tmp/olvm-s390x-release
        qemu-s390x -L /usr/s390x-linux-gnu tmp/olvm-s390x-release repl --version
        echo "(print (syscall 63))" |qemu-s390x -L /usr/s390x-linux-gnu tmp/olvm-s390x-release repl

    - name: Check Reference
      run: DEV_MODE=1 HAVE_PLATFORM=0 HAVE_S390X=1 make check-reference
