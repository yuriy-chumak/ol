name: linux alpha
# notes:
#  don't forget for apt update before installing anything
#  remove man-db autoupdate, it's too time consuming

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  TERM: xterm-256color

# save resources, stop outdated workflows
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make:
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Update submodules
      run: 'git submodule update --init --recursive'

    - name: Apt update
      run: 'sudo rm -f /var/lib/man-db/auto-update; sudo apt update'

    - name: Make ol/vm.h
      run: 'make includes/ol/vm.h'

    - name: Install gcc toolchain
      run: 'sudo apt install gcc-alpha-linux-gnu -y'

    - name: Install qemu
      run: 'sudo apt install qemu-system-alpha qemu-user'

    - name: Build
      run: 'make tmp/olvm-alpha-release'

    - name: Build Info
      run: |
        file tmp/olvm-alpha-release
        qemu-alpha -L /usr/alpha-linux-gnu tmp/olvm-alpha-release repl --version
        echo "(print (syscall 63))" |qemu-alpha -L /usr/alpha-linux-gnu tmp/olvm-alpha-release repl

    - name: Check Reference
      run: DEV_MODE=1 HAVE_PLATFORM=0 HAVE_ALPHA=1 make check-reference
